# Прод: лёгкий образ nginx (только приложение) + контент отдельным томом.
#   cd deploy && docker compose up -d --build
# Сайт на http://<host>:8080  (TLS вешайте обратным прокси — см. README.md).
#
# CONTENT_DIR — путь на хосте с архивом (data/articles.json, reviews.json,
# articles/<slug>/...). По умолчанию — data/ этого репозитория (для dev).
# Для прода: CONTENT_DIR=/srv/chimbal/data docker compose up -d --build

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ncrc-chimbal-lore:latest
    container_name: ncrc-chimbal-lore
    volumes:
      - ${CONTENT_DIR:-../data}:/usr/share/nginx/html/data:ro       # архив (неизменяемый)
      - ${OVERLAY_DIR:-../overlay}:/usr/share/nginx/html/overlay:ro  # правки (читаем)
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Запись overlay (комментарии/разборы). Только на 127.0.0.1, доступ по SSH-туннелю.
  # Единственный сервис с overlay:rw; контент НЕ монтирует вовсе. Профиль admin:
  #   docker compose --profile admin up -d --build admin-api
  admin-api:
    build:
      context: ../admin-api
    image: ncrc-chimbal-admin-api:latest
    container_name: ncrc-chimbal-admin-api
    volumes:
      - ${OVERLAY_DIR:-../overlay}:/overlay:rw
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ALLOW_ORIGIN=${ADMIN_ALLOW_ORIGIN:-*}
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health').status==200 else 1)\""]
      interval: 30s
      timeout: 3s
      retries: 3
    profiles: ["admin"]

  # Экспортёр статей (overclockers-exporter): тянет новые посты в тот же том
  # контента (:rw) и обновляет articles.json. Контракт — docs/exporter-spec.md.
  # Образ overclockers-content-exporter:latest собирается из репозитория
  # экспортёра по его собственной инструкции (Dockerfile/compose внутри него).
  # Тот же том, что у web, но :rw. Профиль updater (не стартует при обычном up):
  #   docker compose --profile updater up -d updater
  updater:
    image: overclockers-content-exporter:latest
    container_name: ncrc-chimbal-updater
    volumes:
      - ${CONTENT_DIR:-../data}:/data:rw
    environment:
      - CONTENT_DIR=/data
      - BLOG_URL=https://overclockers.ru/blog/Hard-Workshop
      - UPDATE_INTERVAL=21600        # период опроса, сек (6 ч)
      - MAX_IMAGE_SIDE=1000          # ресайз картинок как в архиве
      - JPEG_QUALITY=72
      - REQUEST_DELAY_MS=1000        # пауза между запросами (вежливость)
    restart: unless-stopped
    profiles: ["updater"]
