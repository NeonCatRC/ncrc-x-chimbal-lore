# ncrc-x-chimbal-lore — статический архив, отдаётся nginx.
# Кладётся в /etc/nginx/conf.d/default.conf (включается в http-контекст).

# Кэш по типу файла. js/css/шрифты/картинки неизменяемы — ссылки на js/css
# в index.html версионируются (?v=<hash>, см. scripts/build-hash.js), поэтому
# их безопасно кэшировать навсегда. HTML/JSON (контент, overlay) — ревалидация.
map $uri $cache_control {
    default                                              "no-cache";
    "~*\.(?:jpe?g|png|gif|webp|svg|woff2?|js|mjs|css)$"  "public, max-age=31536000, immutable";
}

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Сжатие текста (jpg/png/webp/woff2 уже сжаты).
    gzip            on;
    gzip_static     on;           # отдаст .gz рядом, если есть (без CPU на запрос)
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript text/javascript
                    application/json image/svg+xml application/manifest+json;

    # Заголовки на всё (нет per-location add_header → не перетираются).
    add_header Cache-Control          $cache_control                       always;
    add_header X-Content-Type-Options nosniff                              always;
    add_header Referrer-Policy        no-referrer                          always;
    add_header X-Frame-Options        DENY                                 always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://abacus.jasoncameron.dev http://localhost:8090 http://127.0.0.1:8090; base-uri 'none'; frame-ancestors 'none'; object-src 'none'" always;

    # Никогда не отдаём dotfiles (.git, .done, ...), служебные и сырые файлы.
    location ~ /\.                                            { deny all; }
    location ~* /(Dockerfile|docker-compose\.ya?ml|nginx\.conf)$ { deny all; }
    location ~* /page_raw\.html$                              { deny all; }

    # .jsx (исходники, если попали в дерево) — отдаём как JS.
    location ~* \.jsx$ { default_type application/javascript; }

    # Маршрутизации на клиенте нет — отдаём файлы как есть, иначе 404.
    location / {
        try_files $uri $uri/ =404;
    }
}
