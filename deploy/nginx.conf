# ncrc-x-chimbal-lore — статический архив, отдаётся nginx.
# Кладётся в /etc/nginx/conf.d/default.conf (замещает дефолтный сервер).

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Сжимаем текст. jpg/png/webp/woff2 уже сжаты — их не трогаем.
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json;

    # Никогда не отдаём dotfiles (.git, .done, ...).
    location ~ /\.  { deny all; }

    # И служебные файлы сборки, если попали в корень.
    location ~* /(Dockerfile|docker-compose\.ya?ml|nginx\.conf)$ { deny all; }

    # Картинки и шрифты — имена стабильны (ID), кэшируем навсегда.
    location ~* \.(?:jpe?g|png|gif|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # .jsx тянет Babel-standalone — отдаём как JS, всегда ревалидируем.
    location ~* \.jsx$ {
        default_type application/javascript;
        add_header   Cache-Control "no-cache";
        try_files    $uri =404;
    }

    # Оболочка приложения и данные — ревалидация (правки/новые разборы видны сразу).
    location ~* \.(?:html|json|css|js)$ {
        add_header Cache-Control "no-cache";
        try_files  $uri =404;
    }

    # Маршрутизации на клиенте нет — отдаём файлы как есть, иначе 404.
    location / {
        add_header X-Content-Type-Options nosniff always;
        try_files  $uri $uri/ =404;
    }
}
